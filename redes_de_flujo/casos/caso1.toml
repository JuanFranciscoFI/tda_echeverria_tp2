# Ninguna antena puede aparecer en más de b=3 conjuntos de backup
# Tiene solucion:
# Antena 1: backup = [2, 3]
# Antena 2: backup = [1, 3]
# Antena 3: backup = [1, 4]
# Antena 4: backup = [2, 3]
# Antena 5: backup = [2, 4]

D = 7
k = 2
b = 3

distancias = [
    [0, 5, 6, 7, 8],
    [5, 0, 1, 2, 3],
    [3, 1, 0, 1, 2],
    [7, 2, 1, 0, 1],
    [8, 6, 2, 1, 0],
]
